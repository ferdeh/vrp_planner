services:
  planner-db:
    profiles: ["standalone"]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vrp_planner}
      POSTGRES_USER: ${POSTGRES_USER:-planner}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  planner-backend:
    profiles: ["standalone"]
    build:
      context: ./backend
    environment:
      APP_NAME: vrp_planner
      APP_ENV: dev
      APP_HOST: 0.0.0.0
      APP_PORT: 8080
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://planner:change_me@planner-db:5432/vrp_planner}
      MASTER_DATA_API_BASE_URL: ${MASTER_DATA_API_BASE_URL:-http://spbu-backend:8000}
      TRUCK_MASTER_DATA_API_BASE_URL: ${TRUCK_MASTER_DATA_API_BASE_URL:-http://truck-backend:8000}
      USE_MOCK_MASTER_DATA: ${USE_MOCK_MASTER_DATA:-false}
      SOLVER_MAX_SECONDS: 30
      SOLVER_FIRST_STRATEGY: PATH_CHEAPEST_ARC
      SOLVER_LOCAL_SEARCH: GUIDED_LOCAL_SEARCH
      LOG_LEVEL: INFO
      CORS_ORIGINS: ${CORS_ORIGINS:-http://planner.localhost:8088}
      PLANNER_PUBLIC_BASE_URL: ${PLANNER_PUBLIC_BASE_URL:-http://planner.localhost:8088}
      PLANNER_AUTH_LOGOUT_URL: ${PLANNER_AUTH_LOGOUT_URL:-http://auth.localhost:8088/realms/vrp-platform/protocol/openid-connect/logout}
      PLANNER_OAUTH_CLIENT_ID: ${PLANNER_OAUTH_CLIENT_ID:-oauth2-proxy-planner}
      CORS_ORIGIN_REGEX: ${CORS_ORIGIN_REGEX:-^https?://(localhost|127\\.0\\.0\\.1|10\\.\\d+\\.\\d+\\.\\d+|172\\.(1[6-9]|2\\d|3[0-1])\\.\\d+\\.\\d+|192\\.168\\.\\d+\\.\\d+)(:\\d+)?$}
    expose:
      - "8080"
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8080"
    depends_on:
      planner-db:
        condition: service_healthy

  planner-frontend:
    profiles: ["standalone"]
    build:
      context: ./frontend
    depends_on:
      planner-backend:
        condition: service_started
    environment:
      PLANNER_API_UPSTREAM: ${PLANNER_API_UPSTREAM:-http://planner-backend:8080}
      PORTAL_URL: ${PORTAL_URL:-http://portal.localhost:8088}
    expose:
      - "80"

volumes:
  postgres_data:
